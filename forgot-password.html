<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TuneWave Forgot Password</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="forgot-password.css">
</head>
<body>
  <main class="forgot-shell">
    <section class="forgot-panel panel">
      <div class="forgot-brand">
        <div class="brand-mark">T</div>
        <div>
          <h2>TuneWave</h2>
        </div>
      </div>

      <div class="forgot-copy">
        <p class="eyebrow">Forgot Password</p>
        <h2>Recover your account</h2>
        <p class="muted">Reset your password by confirming your basic account details in one clean form.</p>
      </div>

      <form id="forgotPasswordForm" class="forgot-form">
        <div class="input-stack">
          <label for="recoveryName">Full name</label>
          <input class="field" id="recoveryName" type="text" placeholder="Enter your full name" required>
        </div>

        <div class="input-stack">
          <label for="recoveryEmail">Email</label>
          <input class="field" id="recoveryEmail" type="email" placeholder="you@example.com" required>
        </div>

        <div class="input-stack">
          <label for="recoveryPhone">Phone number</label>
          <input class="field" id="recoveryPhone" type="tel" placeholder="+91 98765 43210" required>
        </div>

        <div class="password-reset-grid">
          <div class="input-stack">
            <label for="newPassword">New password</label>
            <input class="field" id="newPassword" type="password" placeholder="Create new password" required>
          </div>
          <div class="input-stack">
            <label for="confirmNewPassword">Confirm password</label>
            <input class="field" id="confirmNewPassword" type="password" placeholder="Confirm password" required>
          </div>
        </div>

        <button id="resetPasswordBtn" type="submit" class="button forgot-submit">Set New Password</button>
      </form>
      <p id="forgotMessage" class="muted">Enter your details to reset your password.</p>

      <div class="forgot-actions">
        <a class="button secondary" href="LOGIN.html">Back to Login</a>
      </div>
    </section>
  </main>

  <script src="app-theme.js" defer></script>
  <script src="api-config.js" defer></script>
  <script src="forgot-password.js" defer></script>
</body>
</html>

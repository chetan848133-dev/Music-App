<div class="delete-overlay" id="deleteOverlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="delete-popup">
    <h2 class="delete-title" id="deleteTitle">Delete Song</h2>
    <p class="delete-message" id="deleteMessage">Are you sure you want to delete this song? This action cannot be undone.</p>
    <div class="delete-buttons">
      <button id="deleteCancel" class="delete-btn delete-cancel" type="button">Cancel</button>
      <button id="deleteConfirm" class="delete-btn delete-confirm" type="button">Delete</button>
    </div>
  </div>
</div>
